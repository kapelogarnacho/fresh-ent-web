<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Fresh Contact Hub</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="contact-page-body"
  style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; gap:20px;">
  <h1 class="fresh">GET IN TOUCH</h1>
  <div class="centered-links" style="display:flex; flex-direction:column; gap:20px; width:300px;">
    <button class="glow-btn suggest" style="border:2px solid cyan; padding:15px;">Review/Recommend/Suggest</button>
    <button class="glow-btn complain red-flash"
      style="border:2px solid red; padding:15px; animation: flash 0.5s infinite;">Complain (Emergency Lights)</button>
    <button class="glow-btn bmw-buy" style="border:2px solid gold; padding:15px;">Buy Me a BMW</button>
  </div>
  <a href="index.html" style="color:white;">← Return to Base</a>
  <style>
    @keyframes flash {
      from {
        box-shadow: 0 0 20px red;
      }

      to {
        box-shadow: 0 0 5px red;
      }
    }
  </style>
</body>

</html>
