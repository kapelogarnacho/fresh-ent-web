<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRESH MUSIC // LIVE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Page Specific Styles */
    body.music-page-body {
      background: #000;
      overflow-x: hidden;
      /* Live Background Illusion */
      background-image: radial-gradient(circle at 50% 50%, #1a001a 0%, #000 70%);
      animation: bg-pulse-music 10s infinite alternate;
    }

    @keyframes bg-pulse-music {
      0% {
        background-position: 0% 50%;
      }

      100% {
        background-position: 100% 50%;
      }
    }

    /* Live Background Element */
    #music-live-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: url('https://media.giphy.com/media/WZP3qaxYyoZXi/giphy.gif') center/cover;
      opacity: 0.2;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .music-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      padding-bottom: 120px;
      /* Space for player */
    }

    .music-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid #333;
    }

    .music-brand {
      font-size: 2rem;
    }

    /* Category Nav */
    .music-nav {
      display: flex;
      gap: 15px;
      margin: 30px 0;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .music-cat-link {
      padding: 10px 25px;
      background: #111;
      border: 2px solid var(--fresh-cyan);
      color: white;
      text-decoration: none;
      border-radius: 30px;
      white-space: nowrap;
      transition: 0.3s;
    }

    .music-cat-link:hover,
    .music-cat-link.active {
      background: var(--fresh-cyan);
      color: black;
      box-shadow: 0 0 20px var(--fresh-cyan);
    }

    /* Top Class Feature Section with Video Illusion */
    .featured-illusion {
      height: 400px;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 40px;
      box-shadow: 0 0 50px rgba(255, 0, 255, 0.3);
    }

    .illusion-video-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      filter: hue-rotate(45deg) contrast(1.2);
      animation: camera-move 20s infinite alternate ease-in-out;
    }

    @keyframes camera-move {
      0% {
        transform: scale(1) translate(0, 0);
      }

      100% {
        transform: scale(1.1) translate(-20px, 10px);
      }
    }

    .illusion-content {
      position: relative;
      z-index: 2;
      height: 100%;
      background: linear-gradient(to top, #000, transparent);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 40px;
    }

    /* Music Grid */
    .track-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 25px;
    }

    .track-card {
      background: #111;
      border-radius: 10px;
      overflow: hidden;
      transition: 0.3s;
      cursor: pointer;
      position: relative;
    }

    .track-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 0 30px var(--fresh-pink);
    }

    .track-art {
      height: 180px;
      background: #333;
      position: relative;
      overflow: hidden;
    }

    .track-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.5s;
    }

    .track-card:hover .track-art img {
      transform: scale(1.2);
      filter: brightness(0.4);
    }

    .play-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: 0.3s;
      color: var(--fresh-cyan);
      font-size: 3rem;
    }

    .track-card:hover .play-overlay {
      opacity: 1;
    }

    .track-info {
      padding: 15px;
    }

    .track-title {
      font-weight: bold;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      color: #888;
      font-size: 0.9rem;
    }

    /* Permanent Playbox */
    .permanent-player {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100px;
      background: rgba(10, 10, 10, 0.95);
      border-top: 2px solid var(--fresh-cyan);
      backdrop-filter: blur(20px);
      z-index: 10000;
      display: flex;
      align-items: center;
      padding: 0 30px;
      box-shadow: 0 -10px 50px rgba(0, 255, 255, 0.1);
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }

      to {
        transform: translateY(0);
      }
    }

    .player-art {
      width: 70px;
      height: 70px;
      background: #333;
      border-radius: 8px;
      margin-right: 20px;
      overflow: hidden;
    }

    .player-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .player-info {
      flex-grow: 1;
    }

    .player-controls {
      font-size: 2rem;
      display: flex;
      gap: 20px;
      color: #fff;
    }

    .player-controls i {
      cursor: pointer;
      transition: 0.2s;
    }

    .player-controls i:hover {
      color: var(--fresh-cyan);
      text-shadow: 0 0 15px var(--fresh-cyan);
    }
  </style>
</head>

<body class="music-page-body">
  <div class="cursor-follower"></div>
  <div id="music-live-bg"></div>

  <div class="music-container">
    <header class="music-header">

    <div class="featured-illusion">

    <h2>TRENDING TRACKS</h2>

        <div class="track-info">
          <div class="track-title">Neon Dreams</div>
          <div class="track-artist">CyberPunkz</div>
        </div>
      </div>
      <div class="track-card">
        <div class="track-art">
          <img src="https://picsum.photos/200/200?random=101" alt="Art">
          <div class="play-overlay"><i class="fa-solid fa-play"></i></div>
        </div>
        <div class="track-info">
          <div class="track-title">Glitch Protocol</div>
          <div class="track-artist">System Overload</div>
        </div>
      </div>
      <div class="track-card">
        <div class="track-art">
          <img src="https://picsum.photos/200/200?random=102" alt="Art">
          <div class="play-overlay"><i class="fa-solid fa-play"></i></div>
        </div>
        <div class="track-info">
          <div class="track-title">Bass Canon</div>
          <div class="track-artist">Rezz-ish</div>
        </div>
      </div>
      <div class="track-card">
        <div class="track-art">
          <img src="https://picsum.photos/200/200?random=103" alt="Art">
          <div class="play-overlay"><i class="fa-solid fa-play"></i></div>
        </div>
        <div class="track-info">
          <div class="track-title">Midnight Drive</div>
          <div class="track-artist">Lofi Chill</div>
        </div>
      </div>
    </div>
  </div>

  <div class="permanent-player">
    <div class="player-art"><img src="https://picsum.photos/70/70?random=99" alt="Current"></div>
    <div class="player-info">
      <div style="font-weight:bold; color:var(--fresh-cyan)">Select a Track</div>
      <div style="font-size:0.9rem; color:#aaa;">Fresh Music Live</div>
    </div>
    <div class="player-controls">
      <i class="fa-solid fa-backward-step"></i>
      <i class="fa-solid fa-circle-play" style="font-size: 3rem; color: var(--fresh-cyan);"></i>
      <i class="fa-solid fa-forward-step"></i>
    </div>
  </div>

  <script>
    const cursor = document.querySelector('.cursor-follower');
    document.addEventListener('mousemove', (e) => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
  </script>
</body>

</html>
